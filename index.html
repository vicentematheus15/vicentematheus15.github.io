<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Matheus Vicente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #09090b;
        font-family: Inter, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
        padding: 30px;
      }

      .card {
        max-width: 430px;
        width: 100%;
        background: #111114;
        border: 1px solid #222;
        border-radius: 28px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }

      .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid #222;
        margin-bottom: 25px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 15px;
      }

      h2 {
        font-size: 1rem;
        font-weight: 500;
        color: #ffffffd5;
        margin-bottom: 15px;
      }

      p {
        color: #a1a1aa;
        line-height: 1.7;
        margin-bottom: 15px;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 35px;
      }

      a {
        text-decoration: none;
        padding: 18px;
        background: #18181b;
        border-radius: 18px;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: 0.25s;
        border: 1px solid #27272a;
      }

      a:hover {
        transform: translateY(-3px);
        border-color: #3b82f6;
        background: #1e293b;
      }

      .left {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      i {
        font-size: 22px;
        width: 25px;
      }

      .title {
        font-weight: 600;
        text-align: left;
      }

      .subtitle {
        font-size: 0.85rem;
        color: #9ca3af;
        text-align: left;
      }

      .footer {
        border-top: 1px solid #27272a;
        padding-top: 25px;
      }

      .footer h3 {
        margin-bottom: 10px;
      }

      .footer p {
        margin: 0;
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img class="avatar" src="SUA_FOTO.jpg" />

      <h1>Matheus Vicente</h1>

      <h2>Desenvolvedor Backend</h2>
      <p>Node.js | Express | Python | API REST | PostgreSQL | SQLServer</p>

      <div class="links">
        <a href="https://www.linkedin.com/in/vicentematheus15/" target="_blank">
          <div class="left">
            <i class="fa-brands fa-linkedin"></i>

            <div>
              <div class="title">LinkedIn</div>

              <div class="subtitle">Minha trajetória profissional</div>
            </div>
          </div>

          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <a href="https://github.com/vicentematheus15" target="_blank">
          <div class="left">
            <i class="fa-brands fa-github"></i>

            <div>
              <div class="title">GitHub</div>

              <div class="subtitle">Projetos e códigos</div>
            </div>
          </div>

          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <a href="assets/curriculo.pdf" target="_blank">
          <div class="left">
            <i class="fa-solid fa-file-pdf"></i>

            <div>
              <div class="title">Currículo</div>

              <div class="subtitle">Baixar PDF</div>
            </div>
          </div>

          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <a href="mailto:vicentematheus1507@gmail.com">
          <div class="left">
            <i class="fa-solid fa-envelope"></i>

            <div>
              <div class="title">Email</div>

              <div class="subtitle">Entre em contato</div>
            </div>
          </div>

          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>
      </div>

      <div class="footer">
        <h3>Vamos nos conectar!</h3>

        <p>Obrigado por escanear</p>
      </div>
    </div>
  </body>
</html>
